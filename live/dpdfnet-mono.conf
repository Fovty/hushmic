context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "HushMic"
      media.name       = "HushMic"
      filter.graph = {
        nodes = [
          { type   = ladspa
            name   = dpdfnet
            plugin = "/usr/lib/ladspa/libdpdfnet_ladspa.so"
            label  = dpdfnet_mono
            control = { "Attenuation Limit (dB)" = 100.0 }
          }
        ]
      }
      capture.props = {
        node.name   = "hushmic_input"
        node.passive = true
        audio.rate     = 48000
        audio.channels = 1
        audio.position = [ MONO ]
      }
      playback.props = {
        node.name    = "hushmic.Microphone"
        media.class  = Audio/Source
        node.description = "HushMic"
        audio.rate     = 48000
        audio.channels = 1
        audio.position = [ MONO ]
      }
    }
  }
]
